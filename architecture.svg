<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e8b563"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="898" height="398" rx="16" fill="#0a0f1c" stroke="#1c2438"/>

  <!-- workload -->
  <rect x="20" y="130" width="210" height="90" rx="10" fill="#131a2b" stroke="#2a3550" stroke-width="1.5"/>
  <text x="125" y="181" text-anchor="middle" fill="#f2efe9" font-size="16" font-weight="600">Your AI workload</text>

  <!-- backend -->
  <rect x="355" y="115" width="190" height="120" rx="10" fill="#131a2b" stroke="#2a3550" stroke-width="1.5"/>
  <text x="450" y="163" text-anchor="middle" fill="#f2efe9" font-size="17" font-weight="700">Backend</text>
  <text x="450" y="187" text-anchor="middle" fill="#8b93a7" font-size="12">Verification</text>
  <text x="450" y="205" text-anchor="middle" fill="#8b93a7" font-size="12">+ Optimization</text>

  <!-- endpoint -->
  <rect x="670" y="130" width="210" height="90" rx="10" fill="#131a2b" stroke="#2a3550" stroke-width="1.5"/>
  <text x="775" y="181" text-anchor="middle" fill="#f2efe9" font-size="16" font-weight="600">Your AI endpoint</text>

  <!-- frontend -->
  <rect x="350" y="290" width="200" height="90" rx="10" fill="#131a2b" stroke="#2a3550" stroke-width="1.5"/>
  <text x="450" y="331" text-anchor="middle" fill="#f2efe9" font-size="16" font-weight="600">Frontend</text>
  <text x="450" y="352" text-anchor="middle" fill="#8b93a7" font-size="11">Config + Viz + Test</text>

  <!-- arrows -->
  <line x1="236" y1="175" x2="349" y2="175" stroke="#e8b563" stroke-width="1.75" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="551" y1="175" x2="664" y2="175" stroke="#e8b563" stroke-width="1.75" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="450" y1="241" x2="450" y2="284" stroke="#e8b563" stroke-width="1.75" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
</svg>
